<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>藏文典籍 OCR 对照工作台</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./vendor/pdf.min.js" defer></script>
    <script src="./vendor/lucide.min.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">藏</span>
          <div>
            <h1>藏文典籍 OCR 对照工作台</h1>
            <p>PDF 分页原文、BDRC OCR 结果与藏译汉结果逐页校对</p>
          </div>
        </div>

      </header>

      <section class="control-band" aria-label="OCR 和分页控制">
        <div class="control-group wide">
          <label for="endpointInput">BDRC OCR 接口</label>
          <input id="endpointInput" type="url" value="http://127.0.0.1:18090/ocr" spellcheck="false" />
        </div>
        <div class="control-group wide">
          <label for="translateEndpointInput">藏译汉接口</label>
          <input id="translateEndpointInput" type="url" value="http://127.0.0.1:18091/translate" spellcheck="false" />
        </div>
        <div class="control-group">
          <label for="dpiInput">OCR 图片 DPI</label>
          <select id="dpiInput">
            <option value="200">200</option>
            <option value="260" selected>260</option>
            <option value="300">300</option>
            <option value="360">360</option>
          </select>
        </div>
        <div class="control-group">
          <label for="pageInput">页码</label>
          <div class="stepper">
            <button id="prevButton" class="icon-button" type="button" aria-label="上一页">
              <i data-lucide="chevron-left"></i>
            </button>
            <input id="pageInput" type="number" min="1" value="1" />
            <span id="pageTotal">/ 0</span>
            <button id="nextButton" class="icon-button" type="button" aria-label="下一页">
              <i data-lucide="chevron-right"></i>
            </button>
          </div>
        </div>
        <div class="control-group">
          <label for="zoomInput">显示比例</label>
          <select id="zoomInput">
            <option value="fit" selected>适应宽度</option>
            <option value="1">100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
          </select>
        </div>
      </section>

      <section id="statusBar" class="status-bar" role="status">请先上传 PDF 或图片。</section>

      <section class="workspace" aria-label="原文、OCR 和藏译汉对照区">
        <aside class="page-strip" aria-label="页面缩略图">
          <div class="strip-header">
            <i data-lucide="panel-left"></i>
            <span>页</span>
          </div>
          <div id="thumbnailList" class="thumbnail-list"></div>
        </aside>

        <section class="viewer-pane" aria-label="原文单页显示">
          <div class="pane-header">
            <div>
              <span class="eyebrow">原文单页</span>
              <h2 id="sourceTitle">未载入文件</h2>
              <span id="fileOcrStatus" class="file-status status-not-started">ocr 识别未开始</span>
            </div>
            <div id="renderMeta" class="meta-pill">0 页</div>
          </div>
          <div class="pane-toolbar">
            <label class="file-button compact" for="fileInput">
              <i data-lucide="upload"></i>
              <span>上传 PDF</span>
            </label>
            <input id="fileInput" type="file" accept="application/pdf,image/*" />
            <button id="sampleButton" class="ghost-button compact" type="button">
              <i data-lucide="file-plus"></i>
              <span>载入样本</span>
            </button>
            <button id="downloadPageButton" class="ghost-button compact" type="button">
              <i data-lucide="image-down"></i>
              <span>导出页图</span>
            </button>
          </div>
          <div id="pageViewport" class="page-viewport">
            <canvas id="pdfCanvas"></canvas>
            <img id="imagePage" alt="上传图片原文" />
            <div id="sourceLineHighlight" class="source-line-highlight" aria-hidden="true"></div>
            <div id="emptyState" class="empty-state">
              <i data-lucide="file-search"></i>
              <p>上传藏文 PDF 后，这里显示当前单页原文。</p>
            </div>
          </div>
        </section>

        <section class="ocr-pane" aria-label="BDRC OCR 结果">
          <div class="pane-header">
            <div>
              <span class="eyebrow">BDRC OCR 结果</span>
              <h2 id="ocrTitle">等待识别</h2>
            </div>
            <div id="ocrMeta" class="meta-pill">未识别</div>
          </div>

          <div class="ocr-toolbar">
            <button id="checkOcrButton" class="ghost-button compact" type="button">
              <i data-lucide="plug-zap"></i>
              <span>检查服务</span>
            </button>
            <button id="ocrButton" class="primary-button compact" type="button">
              <i data-lucide="scan-text"></i>
              <span>识别当前页</span>
            </button>
            <button id="copyButton" class="ghost-button compact" type="button">
              <i data-lucide="copy"></i>
              <span>复制</span>
            </button>
            <button id="clearButton" class="ghost-button compact" type="button">
              <i data-lucide="eraser"></i>
              <span>清空本页</span>
            </button>
            <button id="downloadTextButton" class="ghost-button compact" type="button">
              <i data-lucide="download"></i>
              <span>导出全部</span>
            </button>
            <div class="font-size-controls" role="group" aria-label="OCR 字体大小">
              <button
                id="decreaseOcrFontButton"
                class="icon-button compact font-size-button"
                type="button"
                aria-label="减小 OCR 字体"
                title="减小 OCR 字体"
              >
                <span class="font-size-glyph" aria-hidden="true">A</span>
                <i data-lucide="minus"></i>
              </button>
              <button
                id="increaseOcrFontButton"
                class="icon-button compact font-size-button"
                type="button"
                aria-label="增大 OCR 字体"
                title="增大 OCR 字体"
              >
                <span class="font-size-glyph" aria-hidden="true">A</span>
                <i data-lucide="plus"></i>
              </button>
            </div>
            <div id="ocrViewSwitch" class="view-switch" role="group" aria-label="OCR 结果显示方式">
              <button id="lineViewButton" class="view-switch-button active" type="button">逐行对照</button>
              <button id="textViewButton" class="view-switch-button" type="button">纯文本</button>
            </div>
          </div>

          <div id="ocrLineCompare" class="ocr-line-compare" aria-label="OCR 逐行校对"></div>

          <textarea
            id="ocrText"
            class="is-hidden"
            spellcheck="false"
            placeholder="点击“识别当前页”后，BDRC OCR 文本会显示在这里；也可以直接粘贴外部识别结果进行校对。"
          ></textarea>

          <div class="result-summary">
            <div>
              <span class="summary-label">当前页字数</span>
              <strong id="charCount">0</strong>
            </div>
            <div>
              <span class="summary-label">已识别页</span>
              <strong id="recognizedCount">0</strong>
            </div>
          </div>
        </section>

        <section class="translation-pane" aria-label="藏译汉结果">
          <div class="pane-header">
            <div>
              <span class="eyebrow">藏译汉结果</span>
              <h2 id="translationTitle">等待翻译</h2>
            </div>
            <div id="translationMeta" class="meta-pill">未翻译</div>
          </div>

          <div class="ocr-toolbar">
            <button id="checkTranslateButton" class="ghost-button compact" type="button">
              <i data-lucide="plug-zap"></i>
              <span>检查翻译</span>
            </button>
            <button id="translateButton" class="primary-button compact" type="button">
              <i data-lucide="languages"></i>
              <span>翻译当前页</span>
            </button>
            <button id="copyTranslationButton" class="ghost-button compact" type="button">
              <i data-lucide="copy"></i>
              <span>复制</span>
            </button>
            <button id="clearTranslationButton" class="ghost-button compact" type="button">
              <i data-lucide="eraser"></i>
              <span>清空本页</span>
            </button>
            <button id="downloadTranslationButton" class="ghost-button compact" type="button">
              <i data-lucide="download"></i>
              <span>导出全部</span>
            </button>
          </div>

          <textarea
            id="translationText"
            spellcheck="false"
            placeholder="点击“翻译当前页”后，会把右侧 OCR 藏文发送到藏译汉接口；也可以直接粘贴人工译文进行逐页校对。"
          ></textarea>

          <div class="result-summary">
            <div>
              <span class="summary-label">当前页中文字数</span>
              <strong id="translationCharCount">0</strong>
            </div>
            <div>
              <span class="summary-label">已翻译页</span>
              <strong id="translatedCount">0</strong>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
