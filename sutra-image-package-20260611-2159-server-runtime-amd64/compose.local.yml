name: sutra-local

services:
  postgres:
    container_name: sutra-local-postgres
    platform: linux/amd64

  redis:
    container_name: sutra-local-redis
    platform: linux/amd64

  sutra-server:
    container_name: sutra-local-server
    platform: linux/amd64
    environment:
      RUST_LOG: sutra_server=info,tower_http=info
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cross-page-service:
    build:
      context: ./cross-page-service
    container_name: sutra-local-cross-page
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sutra}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sutra}
      SUTRA_UPSTREAM: http://sutra-server:5555
    depends_on:
      postgres:
        condition: service_healthy
      sutra-server:
        condition: service_started
    networks: [sutra-net]

  sutra-web:
    depends_on: [sutra-server, cross-page-service]
    container_name: sutra-local-web
    platform: linux/amd64

volumes:
  pgdata:
    name: sutra-local-pgdata
  redisdata:
    name: sutra-local-redisdata
  sutra-storage:
    name: sutra-local-storage

networks:
  sutra-net:
    name: sutra-local-net
