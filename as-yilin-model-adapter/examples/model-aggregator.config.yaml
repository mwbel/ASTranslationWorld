server:
  host: 0.0.0.0
  port: 18081
  data_dir: data

auth:
  users:
    - username: demo
      # 开发环境可用明文；生产环境请换成 password_hash。
      password: demo-password
      reseller_code: demo
      allowed_models:
        - agg-local-qwen25
        - agg-local-gemma2
        - agg-gemini-25-flash

providers:
  - id: model-aggregator
    type: model_aggregator
    # Docker/Colima 容器内访问 Mac 宿主机上的 ModelAggregatorService。
    base_url: http://host.docker.internal:8890
    chat_path: /api/aggregate/chat
    timeout_seconds: 120

models:
  - id: agg-local-qwen25
    display_name: ModelAggregator Local Qwen2.5 14B
    provider: model-aggregator
    upstream_model: local:qwen2.5:14b
    aliases:
      - local:qwen2.5:14b
      - Qwen/Qwen2.5-7B-Instruct
    category: quality_translation
    supports_stream: true
    supports_vision: false
    context_window: 32768

  - id: agg-local-qwen36
    display_name: ModelAggregator Local Qwen3.6 27B
    provider: model-aggregator
    upstream_model: local:qwen3.6-27b:latest
    aliases:
      - local:qwen3.6-27b:latest
      - qwen3.6-27b:latest
      - local:qwen3.6-27b
      - hf-qwen-zh-en
    category: quality_translation
    supports_stream: true
    supports_vision: true
    context_window: 32768
    enabled: false
    source: upstream-empty-response

  - id: agg-local-gemma2
    display_name: ModelAggregator Local Gemma2 27B
    provider: model-aggregator
    upstream_model: local:gemma2:27b
    aliases:
      - local:gemma2:27b
      - gemma2:27b
      - local:gemma2
    category: quality_translation
    supports_stream: true
    supports_vision: false
    context_window: 32768

  - id: agg-local-qwen36-q4
    display_name: ModelAggregator Local Qwen3.6 27B Q4
    provider: model-aggregator
    upstream_model: local:batiai/qwen3.6-27b:q4
    aliases:
      - local:batiai/qwen3.6-27b:q4
      - batiai/qwen3.6-27b:q4
    category: quality_translation
    supports_stream: true
    supports_vision: true
    context_window: 32768
    enabled: false
    source: upstream-empty-response

  - id: agg-gemini-25-flash
    display_name: ModelAggregator Gemini 2.5 Flash
    provider: model-aggregator
    upstream_model: gemini:gemini-2.5-flash
    aliases:
      - gemini:gemini-2.5-flash
      - gemini-2.5-flash
      - agg-gemini-flash
    category: fast_translation
    supports_stream: true
    supports_vision: true
    context_window: 1048576

  - id: agg-gemini-3-flash
    display_name: ModelAggregator Gemini 3 Flash Preview
    provider: model-aggregator
    upstream_model: gemini:gemini-3-flash-preview
    aliases:
      - gemini:gemini-3-flash-preview
      - gemini-3-flash-preview
    category: quality_translation
    supports_stream: true
    supports_vision: true
    context_window: 1048576
    enabled: false
    source: upstream-empty-response
